server {
    listen 80;
    server_name localhost;
    index index.html;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # React Components Storybook - redirect without trailing slash
    location = /react {
        return 301 /react/;
    }
    location /react/ {
        alias /usr/share/nginx/html/react-docs/;
        try_files $uri $uri/ /react/index.html;
    }

    # Web Components Storybook - redirect without trailing slash
    location = /web {
        return 301 /web/;
    }
    location /web/ {
        alias /usr/share/nginx/html/web-docs/;
        try_files $uri $uri/ /web/index.html;
    }

    # CSS Components Storybook - redirect without trailing slash
    location = /css {
        return 301 /css/;
    }
    location /css/ {
        alias /usr/share/nginx/html/css-docs/;
        try_files $uri $uri/ /css/index.html;
    }

    # Host docs at root (must come last to catch everything else)
    location / {
        root /usr/share/nginx/html/host-docs;
        try_files $uri $uri/ /index.html;
        # Cache control for HTML
        add_header Cache-Control "no-cache";
    }
}
