<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../dist/styles.css">
  <style>
    body {
      padding: 16px;
      margin: 0;
    }
  </style>
</head>
<body class="packets light" style="padding: 16px; margin: 0;">
  <h3>Light Theme</h3>
  <div id="container" style="display: flex; flex-direction: column; gap: 16px; width: 300px; background: #f0f0f0; padding: 16px;">
    <p>Primary divider below:</p>
    <hr class="es-divider">
    <p>Branded divider below:</p>
    <hr class="es-divider es-branded">
  </div>

  <hr style="margin: 32px 0;">

  <h3>Dark Theme</h3>
  <div class="dark" style="background: #1a1a1a; padding: 16px;">
    <div id="container-dark" style="display: flex; flex-direction: column; gap: 16px; width: 300px; padding: 16px;">
      <p style="color: white;">Primary divider below:</p>
      <hr class="es-divider">
      <p style="color: white;">Branded divider below:</p>
      <hr class="es-divider es-branded">
    </div>
  </div>
</body>
</html>
