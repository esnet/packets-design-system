<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="dist/styles.css">
  <style>
    body {
      padding: 32px;
      background: white;
    }
    .container {
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .debug-info {
      margin-top: 32px;
      padding: 16px;
      background: #f0f0f0;
      font-family: monospace;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h1>ESAvatar Debug - Transform Test</h1>

  <div class="container">
    <div class="es-avatar es-medium es-lime">
      <span>TU</span>
    </div>
    <div class="es-avatar es-small es-berry">
      <span>SM</span>
    </div>
    <div class="es-avatar es-large es-orange">
      <span>LG</span>
    </div>
  </div>

  <div class="debug-info">
    <div>Expected: Text should be shifted down by 10px</div>
    <div>CSS transform: translateY(10px) should be applied to .es-avatar span</div>
  </div>

  <script>
    // Log computed styles
    const span = document.querySelector('.es-avatar span');
    const computed = window.getComputedStyle(span);
    console.log('Transform:', computed.transform);
    console.log('Font:', computed.font);

    // Add debug overlay
    const debugDiv = document.createElement('div');
    debugDiv.style.cssText = 'position: fixed; top: 10px; right: 10px; background: yellow; padding: 10px; border: 1px solid black;';
    debugDiv.textContent = `Transform: ${computed.transform}`;
    document.body.appendChild(debugDiv);
  </script>
</body>
</html>
