/* ==============================================================================

   ==============================================================================

   Base styles for tab component. State classes are composable:

   Usage: <li class="es-tab es-active">
*/

.es-tab {
  display: flex;
  flex-direction: row;
  justify-content: center;
  align-items: center;
  gap: var(--esnet-size-spacing-xxsmall, 4px);

  min-width: var(--esnet-size-spacing-xxlarge, 64px);
  min-height: var(--esnet-size-spacing-large, 32px);

  border-radius: var(--esnet-size-spacing-xsmall);
  transition: background ease-in var(--esnet-time-duration-short, 100ms);
}

  background-color: var(--esnet-color-light-surface-2, #f2f2f2);
}

  background-color: var(--esnet-color-dark-primary, #004573);
}

  background-color: rgba(256, 256, 256, 0.4);
}

}

  color: var(--esnet-color-light-copy, #1a1a1a);
  text-decoration: none;
}

  color: var(--esnet-color-dark-copy, #e6e6e6);
}

/* ESTab */

.es-spinner {
  display: inline-block;
  position: relative;
  width: var(--esnet-size-spacing-xxlarge);
  height: var(--esnet-size-spacing-medium);
}

@media (prefers-reduced-motion) {
    .es-spinner .es-spinner__dot {
      display: none;
    }

    .es-spinner .es-spinner__noMotionMessage {
      display: inline !important;
    }
  }

.es-spinner .es-spinner__noMotionMessage {
    display: none;
    text-align: center;
    font: var(
      --esnet-typography-label-1-sans-font,
      400 12px/120% var(--esnet-font-family-body-sans)
    );

    color: var(--esnet-color-light-copy-alt, #a8a8a8);
  }

.dark .es-spinner .es-spinner__noMotionMessage {
      color: var(--esnet-color-dark-copy-alt, #a8a8a8);
    }

.es-spinner .es-spinner__dot {
    position: absolute;
    top: 0;
    width: var(--esnet-size-spacing-medium);
    height: var(--esnet-size-spacing-medium);
    border-radius: 50%;
    background: var(--esnet-color-light-copy, #3d3d3d);
    animation-timing-function: cubic-bezier(0, 1, 1, 0);
  }

      background: var(--esnet-color-dark-copy, #e6e6e6);
    }

      left: var(--esnet-size-spacing-xsmall);
      animation: dot1Animation var(--esnet-time-duration-long, 600ms) infinite;
    }

      left: var(--esnet-size-spacing-xsmall);

    }

@keyframes dot1Animation {

  }
  100% {

  }

  }
  100% {

/* ==============================================================================

   ==============================================================================

   Base styles for skeleton surface component. Variants are composable:
   - Shape variants: .es-rounded

   Usage: <div class="es-skeleton-surface es-rounded">
*/

.es-skeleton-surface {
  --stroke-size: var(--esnet-size-border-width-medium, 3px);
  --stroke-radius: var(--esnet-size-spacing-large, 2rem);
  --height: var(--esnet-size-touchtarget-min, 2rem);

  display: block;
  width: 100%;
  min-width: var(--esnet-size-spacing-large);
  height: var(--height);

  position: relative;
  z-index: 0;
  overflow: hidden;
  background-color: var(--esnet-color-core-white-500, #d9d9d9);
}

.dark .es-skeleton-surface {
  background-color: var(--esnet-color-core-black-500, #4d4d4f);
}

/* Shimmer Overlay */

.es-skeleton-surface::before {
  content: "";
  position: absolute;
  z-index: -2;
  left: -200%;
  width: 100%;
  height: 200%;
  background-repeat: no-repeat;

  background-image: linear-gradient(
    to left,
    rgb(245, 245, 245, 0),
    rgb(245, 245, 245) 45%,
    rgb(245, 245, 245) 65%,
    rgb(245, 245, 245, 0) 100%
  );
  animation: shimmerBackground 1s linear infinite;
}

/* Internal */

.es-skeleton-surface::after {
  content: "";
  position: absolute;
  z-index: -1;
  left: var(--stroke-size);
  top: var(--stroke-size);
  width: calc(100% - calc(var(--stroke-size) * 2));
  height: calc(100% - calc(var(--stroke-size) * 2));
  background: var(--esnet-color-core-white-700, #c2c2c2);
}

.dark .es-skeleton-surface::after {
  background-color: var(--esnet-color-core-black-900, #19191a) !important;
}

/* Rounded variant */

.es-skeleton-surface.es-rounded {
  border-radius: var(--stroke-radius);
}

.es-skeleton-surface.es-rounded::after {
  border-radius: var(--stroke-radius);
}

@keyframes shimmerBackground {
  100% {
    transform: translateX(300%);
  }
}

    box-shadow:
      var(--esnet-box-shadow-core-medium,
        0px 2px 3px -1px rgba(0, 0, 0, 0.1),
        0px 4px 5px -1px rgba(0, 0, 0, 0.1)),
      0 0 0 1px var(--esnet-color-light-primary, #0088b5);
  }

.dark .es-input-checkbox__input:hover:not(:disabled), .dark .es-input-checkbox__input:focus:not(:disabled) {
      box-shadow:
        var(--esnet-box-shadow-core-medium,
          0px 2px 3px -1px rgba(0, 0, 0, 0.1),
          0px 4px 5px -1px rgba(0, 0, 0, 0.1)),
        0 0 0 1px var(--esnet-color-dark-secondary, #00b6f2);
    }

/* Pseudo-elements */

/* Custom checkmark */

.es-input-checkbox__input:checked::after {
    content: "";
    position: absolute;
    left: 5.4px;
    width: 6px;
    height: 13px;
    border-style: solid;
    border-color: var(--esnet-color-light-shadow, #4d515e);
    border-width: 0 3px 3px 0;
    transform: rotate(45deg);
    pointer-events: none;
  }

.dark .es-input-checkbox__input:checked:not(:disabled)::after {
    border-color: var(--esnet-color-core-white-100, #ffffff);
  }

.es-input-checkbox__input:disabled {
    cursor: default;
    pointer-events: none;
    accent-color: var(--esnet-color-light-surface-2, #f3f4f8);
    background-color: var(--esnet-color-light-surface-2, #f3f4f8);

    border-color: var(--esnet-color-light-shadow, #4d515e);
  }

.dark .es-input-checkbox__input:disabled {
      accent-color: var(--esnet-color-dark-surface-2, #23242a);
      background-color: var(--esnet-color-dark-surface-2, #23242a);
      border-color: var(--esnet-color-dark-shadow, #5c5f6b);
    }

.es-input-checkbox__input:disabled:checked::after {
      border-color: var(--esnet-color-light-copy-alt, #b0b3ba);
    }

.dark .es-input-checkbox__input:disabled:checked::after {
        border-color: var(--esnet-color-dark-copy-alt, #7c7f8a);
      }

/* Variants */

.es-input-checkbox.es-branded>.es-input-checkbox__input:checked:not(:disabled) {
  accent-color: var(--esnet-color-light-primary, #0088b5);
  background-color: var(--esnet-color-light-primary, #0088b5);
}

.dark .es-input-checkbox.es-branded>.es-input-checkbox__input:checked:not(:disabled) {
  accent-color: var(--esnet-color-dark-primary, #004573);
  background-color: var(--esnet-color-dark-primary, #004573);
}

.es-input-checkbox.es-branded>.es-input-checkbox__input:checked:not(:disabled)::after {
  border-color: var(--esnet-color-core-white-100, #ffffff);
}

/* ESInputCheckbox */

.es-icon {
    color: var(--esnet-color-light-surface-2);
}

.dark .es-icon {
        color: var(--esnet-color-dark-surface-2);
    }

/* ESIcon */

/* ==============================================================================
   ES-ICON-BUTTON - Composable Base Class
   ==============================================================================

   Base styles for icon button component. Variants are applied via composable classes:
   - Color variants: .es-primary, .es-secondary, .es-tertiary, .es-destructive, .es-branded
   - Size variants: .es-medium, .es-xxlarge
   - Layout variants: .es-fill, .es-nofill, .es-square

   Usage: <button class="es-icon-button es-primary es-medium">
*/

.es-icon-button {
  --spacing-horizontal-layout-gap: var(--esnet-size-spacing-xxsmall, 4px);

  --spacing-height-medium: 40px;
  --spacing-height-xxlarge: var(--esnet-size-spacing-xxlarge, 64px);

  --spacing-padding-horizontal: var(--esnet-size-spacing-large, 32px);
  --spacing-padding-vertical: var(--esnet-size-spacing-xxsmall, 4px);

  --spacing-border-radius: var(--esnet-size-radius-xxlarge, 18px);
  --spacing-border-width: var(--esnet-size-radius-small, 2px);

  /* Layout */
  display: inline-flex;
  width: auto;
  min-height: var(--spacing-height-medium);
  box-sizing: border-box;

  justify-content: center;
  align-items: center;
  gap: var(--spacing-horizontal-layout-gap);

  padding: var(--esnet-size-border-width-medium, 4px)
    var(--esnet-size-spacing-medium, 16px);

  /* Styling */
  border-radius: var(--spacing-border-radius);
  border: var(--spacing-border-width) solid
    var(--esnet-color-core-blue-900, #004573);
  box-shadow: var(var(--esnet-box-shadow-core-light));
  color: var(--esnet-color-core-slate-900, #3f424d);

  transition:
    background ease-in-out var(--esnet-time-duration-quick, 250ms),
    border-color ease-in-out var(--esnet-time-duration-quick, 250ms),
    box-shadow ease-in-out var(--esnet-time-duration-quick, 250ms);
}

/* Pseudo-events */

.es-icon-button:hover {
    cursor: pointer;
    border-width: 3px; /* TODO: Find token solution */
    box-shadow: var(--esnet-box-shadow-core-medium);

    padding: var(--esnet-size-border-width-medium, 4px)
      calc(var(--esnet-size-spacing-medium, 16px) - 1px);
  }

.es-icon-button:disabled {
    cursor: not-allowed;
  }

/* ESIconButton */

.es-form-section {
  --section-gap: var(--esnet-size-spacing-xxsmall, 4px);

  padding: var(--esnet-size-spacing-medium);
  border-radius: var(--esnet-size-spacing-xsmall);

  margin-bottom: var(--esnet-size-spacing-medium);
  background: var(--esnet-color-light-surface-1, #e3e3e3);
}

.dark .es-form-section {
    background: var(--esnet-color-dark-surface-1, #3d3d3d);
  }

.es-form-section .es-form-section__leftCol {
    margin-bottom: var(--esnet-size-spacing-medium);
  }

.es-form-section .es-form-section__leftCol > p {
      color: var(--esnet-color-copy-alt);
    }

.es-form-section .es-form-section__rightCol {
    margin-bottom: var(--esnet-size-spacing-medium);
  }

.sheet & .es-form-section {
    display: block;
  }

/* ESFormSection */

/* ==============================================================================
   ES-DIVIDER - Composable Base Class
   ==============================================================================

   Base styles for divider component. Variants are composable:
   - Color variants: .es-branded

   Usage: <hr class="es-divider es-branded">
*/

.es-divider {
  /* Layout */
  height: var(--esnet-size-border-width-small, 2px);
  width: auto;

  /* Styling */
  border-radius: var(--esnet-size-radius-circle, 999px);
  border: none;

  /* Set the thickness of the line */
  background-color: var(--esnet-color-light-copy-alt, #6E6E70);
}

/* Dark Mode */

.dark .es-divider {
  background-color: var(--esnet-color-dark-copy-alt, #C2C2C2);
}

/* Branded variant */

.es-divider.es-branded {
  background-color: var(--esnet-color-light-primary, #0088B5);
}

/* Dark Mode */

.dark .es-divider.es-branded {
  background-color: var(--esnet-color-dark-primary, #004573);
}

/* ESDivider */

.es-datum {
  --label-font: var(
    --esnet-typography-label-1-sans-font,
    400 12px/120% var(--esnet-font-family-body-sans)
  );
  --label-letterspace: var(
    --esnet-typography-label-2-sans-letterspacing,
    -0.18px
  );
}

.es-datum .es-datum__label {
    display: block;
    color: var(--esnet-color-light-copy-alt, #a8a8a8);

    font: var(--label-font);
    letter-spacing: var(--label-letterspace);
  }

.dark .es-datum .es-datum__label {
      color: var(--esnet-color-dark-copy-alt, #a8a8a8);
    }

.es-datum .es-datum__value {
    font: var(
      --esnet-typography-copy-1-sans-font,
      400 16px/120% var(--esnet-font-family-body-sans)
    );
    
    color: var(--esnet-color-light-copy, #3d3d3d);
  }

.dark .es-datum .es-datum__value {
      color: var(--esnet-color-dark-copy, #e6e6e6);
    }

/* ESDatum */

/* ==============================================================================
   ES-DATA-TABLE - Semantic Table Component
   ==============================================================================

   Uses natural table element selectors for clean, semantic markup.

   Usage: <table class="es-data-table">
            <thead>...</thead>
            <tbody>...</tbody>
          </table>
*/

.es-data-table {
  --background-color: var(--esnet-color-core-white-100, #fff);
  --background-dark-color: var(--esnet-color-core-slate-1000, #30333b);
  --header-background-color: var(--esnet-color-core-blue-900);
  --header-copy-color: var(--esnet-color-core-white-100);
  --body-copy-color: var(--esnet-color-light-copy, #1a1a1a);

  --table-row-even-background-color: rgba(0, 0, 0, 0.05);
  --table-row-hover-background-color: rgba(0, 0, 0, 0.1);

  --label-typography: var(--esnet-typography-header-6-sans-font);

  --corner-radius: var(--esnet-size-radius-large, 6px);
  --cell-padding: var(--esnet-size-spacing-xsmall, 8px) var(--esnet-size-spacing-medium, 16px);

  table-layout: auto;
  display: block;
  width: 100%;
  max-width: 100%;
  border-radius: var(--corner-radius);
  background-color: var(--background-color);
}

@media (min-width: 640px) {
  .es-data-table {
    table-layout: auto;
    display: table;
    overflow: hidden;
  }
}

.dark .es-data-table {
  --table-row-even-background-color: rgba(0, 0, 0, 0.5);
  --table-row-hover-background-color: rgba(0, 0, 0, 0.6);
  --background-color: var(--background-dark-color);
  --body-copy-color: var(--esnet-color-dark-copy, #e6e6e6);
}

/* Table Header */

.es-data-table thead {
  background-color: var(--header-background-color);
  color: var(--header-copy-color);
  display: block;
}

@media (min-width: 640px) {
  .es-data-table thead {
    display: table-header-group;
  }
}

.es-data-table thead th {
  padding: var(--cell-padding);
  display: none;
  vertical-align: top;
}

.es-data-table thead th:first-of-type {
  border-top-left-radius: var(--corner-radius);
  display: block;
  width: 100%;
}

@media (min-width: 640px) {
  .es-data-table thead th:first-of-type {
    display: table-cell;
    width: auto;
  }
}

.es-data-table thead th:last-of-type {
  border-top-right-radius: var(--corner-radius);
}

.es-data-table thead th .labelWrapper {
  display: flex;
  align-items: center;
  gap: var(--esnet-size-spacing-xxsmall);
  width: 100%;
  font: var(--label-typography);
  color: var(--esnet-color-dark-copy, #e6e6e6);
}

@media (min-width: 640px) {
  .es-data-table thead th {
    display: table-cell;
    max-height: 10px;
    max-width: 100px;
  }
}

/* Table Body */

.es-data-table tbody {
  display: block;
}

@media (min-width: 640px) {
  .es-data-table tbody {
    display: table-row-group;
  }
}

.es-data-table tbody tr {
  display: block;
  padding: var(--esnet-size-spacing-medium) 0;
  transition: background ease-in var(--esnet-time-duration-short, 100ms);
}

.es-data-table tbody tr:hover,
.es-data-table tbody tr:nth-child(even):hover {
  background-color: var(--table-row-hover-background-color);
}

.es-data-table tbody tr:nth-child(even) {
  background-color: var(--table-row-even-background-color);
}

@media (min-width: 640px) {
  .es-data-table tbody tr {
    display: table-row;
  }
}

.es-data-table tbody td {
  padding: var(--cell-padding);
  vertical-align: middle;
  display: block;
  color: var(--body-copy-color);
}

.es-data-table tbody td::before {
  display: block;
  content: attr(data-label);
  font: var(--label-typography);
  color: var(--esnet-color-copy-alt);
}

@media (min-width: 640px) {
  .es-data-table tbody td {
    display: table-cell;
    width: auto;
  }

  .es-data-table tbody td::before {
    display: none;
    content: "";
  }
}

/* Table Footer */

.es-data-table tfoot {
  background-color: var(--header-background-color);
  padding: var(--cell-padding);
  color: var(--header-copy-color);
  display: block;
  position: sticky;
  bottom: 0;
}

@media (min-width: 640px) {
  .es-data-table tfoot {
    display: table-footer-group;
  }
}

.es-data-table tfoot tr {
  display: block;
}

@media (min-width: 640px) {
  .es-data-table tfoot tr {
    display: table-row;
  }
}

.es-data-table tfoot td {
  padding: var(--cell-padding);
  vertical-align: top;
  display: block;
  color: var(--header-copy-color);
}

@media (min-width: 640px) {
  .es-data-table tfoot td {
    display: table-cell;
  }
}

.es-data-table tfoot td:first-of-type {
  border-bottom-left-radius: var(--esnet-size-radius-large);
}

.es-data-table tfoot td:last-of-type {
  border-bottom-right-radius: var(--esnet-size-radius-large);
}

/* ESDataTable */

.commaSeparatedList {
  display: inline;
  list-style: none;
  padding: 0;
  margin: 0;
}

.commaSeparatedList.vertical {
    flex-direction: column;
  }

.commaSeparatedList .commaSeparatedListItem {
    display: inline;
  }

.commaSeparatedList .commaSeparatedListItem:not(:last-child)::after {
      content: ", ";
    }

/* ESCommaSeperatedList */

/* ==============================================================================
   ES-BUTTON - Composable Base Class
   ==============================================================================

   Base styles for button component. Variants are applied via composable classes:
   - Color variants: .es-primary, .es-secondary, .es-tertiary, .es-destructive, .es-branded
   - Size variants: .es-medium, .es-xxlarge
   - Layout variants: .es-fill, .es-nofill

   Usage: <button class="es-button es-primary es-medium">
*/

.es-button,
a.es-button {
  --spacing-horizontal-layout-gap: var(--esnet-size-spacing-xxsmall, 4px);

  --spacing-height-medium: 40px;
  --spacing-height-xxlarge: var(--esnet-size-spacing-xxlarge, 64px);

  --spacing-padding-horizontal: var(--esnet-size-spacing-large, 32px);
  --spacing-padding-vertical: var(--esnet-size-spacing-xxsmall, 4px);

  --spacing-border-radius: var(--esnet-size-radius-xxlarge, 18px);
  --spacing-border-width: var(--esnet-size-radius-small, 2px);

  --typography-font: var(
    --esnet-typography-button-1-sans-font,
    700 16px/120% var(--esnet-font-family-body-sans)
  );

  /* Layout */
  display: inline-flex;
  width: auto;
  padding: var(--esnet-size-border-width-medium, 4px)
    var(--esnet-size-spacing-medium, 16px);
  box-sizing: border-box;

  justify-content: center;
  align-items: center;
  gap: var(--spacing-horizontal-layout-gap);
  min-width: 44px;

  /* Styling */
  border-radius: var(--spacing-border-radius);
  border: var(--spacing-border-width) solid
    var(--esnet-color-core-blue-900, #004573);
  box-shadow: var(var(--esnet-box-shadow-core-light));

  /* Typography */
  color: var(--esnet-color-core-slate-900, #3f424d);
  text-align: center;

  font: var(--typography-font);

  line-height: normal;
  text-decoration: none;

  transition:
    background ease-in-out var(--esnet-time-duration-quick, 250ms),
    border-color ease-in-out var(--esnet-time-duration-quick, 250ms),
    box-shadow ease-in-out var(--esnet-time-duration-quick, 250ms);
}

/* Pseudo-events */

.es-button:hover, a.es-button:hover {
    cursor: pointer;
    box-shadow: var(--esnet-box-shadow-core-medium);

    padding: var(--esnet-size-border-width-medium, 4px)
      var(--esnet-size-spacing-medium, 16px);
  }

.es-button:disabled, a.es-button:disabled {
    cursor: not-allowed;
  }

/* ESButton */

.es-button-group {
  --spacing: var(--esnet-size-spacing-xsmall, 8px);
  --label-color: var(--esnet-color-light-copy, #3d3d3d);
  --label-color-dark: var(--esnet-color-dark-copy, #e6e6e6);
}

.dark .es-button-group {
    --label-color: var(--label-color-dark);
  }

.es-button-group label {
    color: var(--label-color);
  }

/* Variants */

.es-button-group .es-button-group__list {
    padding: 0;
    margin: 0;
    list-style: none;
    display: flex;
    align-items: flex-start;
    gap: var(--spacing);
    flex-direction: row;
  }

.es-button-group--vertical .es-button-group__list {
    flex-direction: column;
  }

.es-button-group--horizontal .es-button-group__list {
    flex-direction: row;
  }

@media (max-width: 640px) {

  .es-button-group--horizontal .es-button-group__list {
      flex-direction: column
  }
    }

/* ESButtonGroup */

.es-breadcrumbs {
  --divider-color: var(--esnet-color-core-black-500, #4d4d4f);
  --link-color: var(--esnet-color-light-copy, #3d3d3d);

  display: flex;
  gap: var(--esnet-size-spacing-xsmall);
  flex-wrap: wrap;
  margin-bottom: var(--esnet-size-spacing-medium);
}

.dark .es-breadcrumbs {
    --divider-color: var(--esnet-color-core-white-800, #b3b3b3);
    --link-color: var(--esnet-color-dark-copy, #e6e6e6);
  }

.es-breadcrumbs .es-breadcrumbs__breadCrumb {
    display: flex;
    align-items: center;
    gap: var(--esnet-size-spacing-xsmall);
  }

.es-breadcrumbs .es-breadcrumbs__breadCrumb > a {
      color: var(--link-color) !important;
      padding-bottom: 0;
    }

.es-breadcrumbs .es-breadcrumbs__breadCrumb > a:hover {
        text-decoration: underline;
      }

.es-breadcrumbs .es-breadcrumbs__breadCrumb::after {
      content: "/";
      display: inline-block;
      color: var(--divider-color);

      font: var(
        --esnet-typography-label-2-sans-font,
        700 12px/120% var(--esnet-font-family-body-sans)
      );
    }

.es-breadcrumbs .es-breadcrumbs__breadCrumb:last-child::after {
      content: none;
    }

/* ESBreadcrumbs */

/* ==============================================================================
   ES-AVATAR - Composable Base Class
   ==============================================================================

   Base styles for avatar component. Variants are applied via composable classes:
   - Size variants: .es-small, .es-medium, .es-large
   - Color variants: .es-grape, .es-lime, .es-berry, .es-orange

   Usage: <div class="es-avatar es-medium es-grape">
*/

.es-avatar {
  --shadow: var(
    --esnet-box-shadow-core-medium,
    0px 2px 3px -1px rgba(0, 0, 0, 0.1),
    0px 4px 5px -1px rgba(0, 0, 0, 0.1)
  );
  --border: var(--esnet-size-border-width-small, 2px) solid
    var(--esnet-color-core-white-100, #fff);
  --border-radius: var(--esnet-size-radius-xxlarge, 18px);
  --border-hover-color: var(--esnet-color-core-blue-600, #0088b5);

  --size: var(--esnet-size-spacing-xlarge, 40px);
  --label-font: var(
    --esnet-typography-header-5-sans-font,
    600 20px/140% var(--esnet-font-family-header-sans)
  );

  display: flex;
  width: var(--size);
  height: var(--size);

  border: var(--border);
  box-shadow: var(--shadow);
  border-radius: var(--border-radius);
  overflow: hidden;
}

.es-avatar .es-avatar__label {
  display: flex;
  justify-content: center;
  align-items: center;
  flex: 1;
  width: 100%;

  font: var(--label-font);
  text-decoration: none;
  text-transform: uppercase;
  color: var(--esnet-color-core-white-100, #fff);
}

/* Pseudo Events */

.es-avatar--isHoverable {
  transition:
    border 200ms ease-in,
    box-shadow 200ms ease-in;
}

.es-avatar--isHoverable:hover {
  cursor: pointer;
  border-color: var(--border-hover-color);
  box-shadow:
    0px 2px 3px -1px rgba(0, 0, 0, 0.2),
    0px 4px 5px -1px rgba(0, 0, 0, 0.2);
  /* TODO: Consider making a darker shadow token */
}

/* Image element */

.es-avatar .es-avatar__image {
  width: 100%;
  aspect-ratio: 1/1;
}

.es-avatar--brokenImage .es-avatar__image {
  display: none;
}

/* ESAvatar */

/* ==============================================================================
   ES-ALERT - Composable Base Class
   ==============================================================================

   Base styles for alert component. Variants are applied via composable classes:
   - Semantic variants: .es-error, .es-warning, .es-info, .es-success

   Usage: <div class="es-alert es-error">
*/

.es-alert {
  --icon-size: var(--esnet-size-touchtarget-min, 32px);
  --section-gap: var(--esnet-size-spacing-medium, 16px);
  --title-label-font: var(
    --esnet-typography-header-5-sans-font,
    600 20px/140% var(--esnet-font-family-header-sans)
  );

  border-radius: var(--esnet-size-radius-xlarge, 8px);
  padding: var(--esnet-size-spacing-medium, 16px);
  display: flex;
  gap: var(--section-gap);
  background-color: var(--esnet-color-light-surface-2, #f2f2f2);

  animation: fadeInSlideUp var(--esnet-time-duration-quick, 250ms) ease-in-out;
}

@media (prefers-reduced-motion) {
  .es-alert {
    animation: none;
  }
}

.dark .es-alert {
  color: var(--esnet-color-dark-copy, #e6e6e6);
  background-color: var(--esnet-color-dark-surface-2, #f2f2f2);
}

.dark .es-alert label,
.dark .es-alert p,
.dark .es-alert h1,
.dark .es-alert h2,
.dark .es-alert h3,
.dark .es-alert h4,
.dark .es-alert h5,
.dark .es-alert h6 {
  color: var(--esnet-color-dark-copy, #e6e6e6);
}

.es-alert .es-alert__icon {
  display: block;
  width: var(--icon-size);
  height: var(--icon-size);
}

.es-alert .es-alert__title {
  margin: 0;
  font: var(--title-label-font);
  text-decoration: none;
}

@keyframes fadeInSlideUp {
  from {
    translate: 0 var(--esnet-size-spacing-medium, 16px);
    opacity: 0;
    transform: scale(0.95);
  }

  to {
    translate: 0 0;
    opacity: 1;
