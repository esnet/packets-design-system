<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="../ui-css/dist/styles.css">
  <script type="module" src="./dist/esm/bundle.js"></script>
  <script type="importmap">
    {
      "imports": {
        "lucide": "https://unpkg.com/lucide@0.563.0/dist/esm/lucide/src/lucide.js"
      }
    }
  </script>
</head>
<body class="packets" style="padding: 40px;">
  <h3>Data Table Test - Empty</h3>
  <es-data-table id="empty"></es-data-table>

  <h3>Data Table Test - With Data</h3>
  <es-data-table
    id="with-data"
    columns='[{"key":"name","label":"Name","width":"40%"},{"key":"value","label":"Value","width":"30%"},{"key":"createdAt","label":"Created At","width":"30%"}]'
    data='[{"name":"Jane Doe","value":"@janedoe","createdAt":"August 26, 1900"},{"name":"John Doe","value":"@johndoe","createdAt":"August 26, 1931"}]'>
  </es-data-table>

  <h3>Data Table Test - Sortable</h3>
  <es-data-table
    id="sortable"
    sortable
    columns='[{"key":"name","label":"Name","width":"40%","sortable":true},{"key":"value","label":"Value","width":"30%","sortable":true},{"key":"createdAt","label":"Created At","width":"30%","sortable":true}]'
    data='[{"name":"Jane Doe","value":"@janedoe","createdAt":"August 26, 1900"},{"name":"John Doe","value":"@johndoe","createdAt":"August 26, 1931"},{"name":"Alice Smith","value":"@asmith","createdAt":"March 15, 1945"},{"name":"Bob Johnson","value":"@bjohnson","createdAt":"July 4, 1976"}]'>
  </es-data-table>

  <script type="module">
    // Listen for sort changes
    const sortableTable = document.querySelector('#sortable');
    sortableTable.addEventListener('sort-change', (e) => {
      console.log('Sort state changed:', e.detail.sortState);
    });
  </script>
</body>
</html>
